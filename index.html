<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game!</title>
    <style>
        .board {
            display: grid;
            grid-template-columns: repeat(17, 150px);
            grid-template-rows: repeat(15, 150px);
            background-color: #18353B;
            width: fit-content;
            height: fit-content;
        }
        #root{
            background: #373737;
            display: flex;
            flex-direction: column;
            align-items: center;
            align-content: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body style=" display: flex; flex-direction: column; align-content: center; justify-content: center; background-color: #373737;">
    
    <section id="root"></section>

    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel-->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const root = document.getElementById('root')
        const reactRoot = ReactDOM.createRoot(root)

        const getRandomInt = (min, max) => {
            return Math.floor(Math.random() * (max - min + 1) + min);
        }

        const Title = ({title}) => {
        const[color, setColors] = React.useState(true)
        if (color) {
            return (
                <h1 style={{ color: "#A0CC00", fontSize: "400px", textAlign: "center", margin: '20px'}} onClick={() => setColors(false)}>{title}</h1>
            )
        }
        return (
                <h1 style={{ color: "#02887C", fontSize: "400px", textAlign: "center"  }} onClick={() => setColors(true)}>{title}</h1>
        )
        }

        const Score = ({score}) => {
            const style = {
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                gap: '10px',
                background: '#18353B',
                color: '#A0CC00',
                fontSize: '150px',
                fontWeight: 'bold',
                fontFamily: 'monospace',
                padding: '10px 30px',
                borderRadius: '20px',
                marginBottom: '15px',
                border: '3px solid #02887C',
                letterSpacing: '2px'
            }

            const emoji_style = {
                fontSize: '150px'
            }

            return (
                <div style={style}>
                    <span style={emoji_style}>🍎</span>
                    <span>SCORE: {String(score).padStart(6, '0')}</span>
                    <span style={emoji_style}>🍎</span>
                </div>
            )
        }

        const Body = ({x, y}) => {
            const style = {
                display: 'flex',
                flexDirection: 'row',
                alignItems: 'center',
                justifyContent: 'center',
                gap: '5px',
                width: '150px',
                height: '150px',
                background: '#A0CC00',
                boxSizing: 'border-box',
                border: '1px solid #02887C',
                gridColumn: x,
                gridRow: y,
            }

            return <section style={style} />
        }

        const Board = ({setShow}) => {
            
            const [score, setScore] = React.useState(0)
            const [fruitPos, setFruitPos] = React.useState({x: 8, y: 10})
            const [position, setPosition] = React.useState({x: 3, y: 4})
            const [body, setBody] = React.useState([{x: 2, y: 4}, {x: 1, y: 4}])
            const [direction, setDirection] = React.useState('ArrowRight')


            const gridCollition = () => {
                setTimeout(() => setShow(3), 250)
            }
            const Devoured = () => {
                setScore(oldScore => oldScore + 100)
                
                setBody((oldBody)=>{
                    if (oldBody.length ===0){
                        return [
                            {x: position.x, y: position.y}
                        ]
                    }

                    return [
                        ...oldBody, {...oldBody[oldBody.length -1]}
                    ]
                })

                setFruitPos({x: getRandomInt(1,16), y: getRandomInt(1,14)})
            }   

            React.useEffect(() => {
                const handleKeyDown = (event) => {
                    switch (event.key) {
                        case 'ArrowRight':
                            setDirection('ArrowRight')
                            break

                        case 'ArrowLeft':
                            setDirection('ArrowLeft')
                            break

                        case 'ArrowUp':
                            setDirection('ArrowUp')
                            break

                        case 'ArrowDown':
                            setDirection('ArrowDown')
                            break
                    }
                }
                    window.addEventListener("keydown", handleKeyDown)
                    return () => {
                        window.removeEventListener("keydown", handleKeyDown)
                }
            }, [])

            React.useEffect(() => {
                const speed = Math.max(80, 250 - body.length * 10)
                const i = setInterval(() => {
                    setPosition((oldPosition) => {
                        const oldHead = {...oldPosition}
                        let newPosition = { ...oldPosition}
                        switch (direction) {
                            case 'ArrowRight':
                                newPosition = {x: oldPosition.x + 1, y: oldPosition.y}
                                break

                            case 'ArrowLeft':
                                newPosition = {x: oldPosition.x - 1, y: oldPosition.y}
                                break

                            case 'ArrowUp':
                                newPosition = {x: oldPosition.x, y: oldPosition.y - 1}
                                break

                            case 'ArrowDown':
                                newPosition = {x: oldPosition.x, y: oldPosition.y + 1}
                                break
                        }

                        if (
                            newPosition.x < 1 ||
                            newPosition.x > 17 ||
                            newPosition.y < 1 ||
                            newPosition.y > 15
                        ) {
                            gridCollition()
                            return oldPosition
                        }
                        if (newPosition.x === fruitPos.x && newPosition.y === fruitPos.y) {
                            Devoured()
                        }
                        
                        setBody((oldBody) => {
                            const hitBody = oldBody.some(
                                (segment) => segment.x === newPosition.x && segment.y === newPosition.y
                            )
                            if (hitBody) {
                                gridCollition()
                                return oldBody
                            }

                            const newBody = [...oldBody]
                            for (let i = newBody.length - 1; i > 0; i--) {
                                newBody[i] = { ...newBody[i - 1] }
                            }
                            if (newBody.length > 0) {
                                newBody[0] = oldHead
                            }
                            return newBody
                        })
                        return newPosition
                    })
                }, speed)
                return () => clearInterval(i)
            }, [direction, fruitPos, body.length])

            return (
                <>
                    <Score score={score}/>
                    <main className="board" style={{
                        border: '50px solid #18353B',
                        borderRadius: '30px',
                        overflow: 'hidden'
                    }}>
                        <Fruit x={fruitPos.x} y={fruitPos.y} />
                        <Snake x={position.x} y={position.y} />
                        {
                            body.map((segment, index) => {
                                return <Body key={index} x={segment.x} y={segment.y} />
                            })
                        }
                    </main>
                </>
            )

        }
        const Snake = ({x, y}) => {
            
            const style_body = {
                display: 'flex',
                flexDirection: 'row',
                alignItems: 'center',
                justifyContent: 'center',
                gap: '5px',
                width: '150px',
                height: '150px',
                background: '#A0CC00',
                boxSizing: 'border-box',
                border: '1px solid #02887C',
                gridColumn: x,
                gridRow: y,
            }
            const style_eyes = {
                display: 'flex',
                flexDirection: 'row',
                alignItems: 'center',
                justifyContent: 'center',
                width:'50px',
                height: '50px',
                background: 'white',
            }

            return  <section style={style_body}>
                    <div style={style_eyes}>■</div>
                    <div style={style_eyes}>■</div>
                    </section>
        }

        const Start = ({setShow}) => {
            const style = {
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                justifyContent: 'center',
                height: '75%',
                width: '75%',
                padding:'2%',
                background: '#A0CC00',
                border: '50px solid #18353B',
                borderRadius: '30px'
            }
            
            const font_style = {
                color: 'black',
                fontSize: '150px',
                textAlign: 'center'
            }

            const button_style = {
                height: 'fit-content',
                width: 'fit-content',
                padding: '20px',
                background: '#02887C',
                border: '1px solid #373737',
                color: 'white',
                padding: '1%',
                fontSize: '200px',
                borderRadius: '80px'
            }


                return (<section style={style}>
                <p style={font_style}>Welcome to the classic Snake Game! <br />
                    1. Press <b>Start</b> to begin the game. <br />

                    2. Use the <b>arrow keys</b> (<b>↑ ↓ ← →</b>) to move the snake. <br />

                    3. Eat the fruits to earn points and make the snake grow longer.<br />

                    4. Avoid hitting the edges of the board. <br />

                    5. If you lose, the <b>Game Over</b> screen will appear and you can press <b>Try Again</b> to play once more. <br />

                    Press sssstart to play!</p>
                <button onClick={() => setShow(2)} style={button_style}>Start</button>
                </section> )
        }

        const GameOver = ({setShow}) => {
            const style = {
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                justifyContent: 'center',
                height: '75%',
                width: '75%',
                padding: '2%',
                background: '#A0CC00',
                border: '50px solid #18353B',
                borderRadius: '30px'
            }

            const font_style = {
                color: 'black',
                fontSize: '150px',
                textAlign: 'center'
            }

            const button_style = {
                height: 'fit-content',
                width: 'fit-content',
                background: '#02887C',
                border: '1px solid #373737',
                color: 'white',
                padding: '1%',
                fontSize: '200px',
                borderRadius: '80px'
            }

            return (
                <section style={style}>
                    <p style={font_style}>
                        Game Over! 🐍 <br />
                        Don't worry, you can always try again!
                    </p>
                    <button onClick={() => setShow(2)} style={button_style}>Try Again</button>
                </section>
            )
        }

        const Fruit = ({x, y}) => {
            const style = {
                height: '150px',
                width: '150px',
                gridColumn: x,
                gridRow: y,
            }
            
            return <div style={style}> <img src="./Fruit.png" width="100%" height="100%"/> </div>
        }
        const Game = () => {
            const [show, setShow] = React.useState(1)
            let screen
            switch (show){
                case 1:
                    screen = <Start setShow = {setShow} />
                    break
                case 2:
                    screen = <Board setShow = {setShow}/>
                    break
                case 3:
                    screen = <GameOver setShow = {setShow}/>
                    break
                
            }
            return(
                <>
                <Title title = "Snake 🐍"/>
                {screen}
                </>
            )
        }
        reactRoot.render(<Game />)
    </script>
</body>
</html>
