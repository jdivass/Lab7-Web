<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game!</title>
    <style>
        .board{
            display: grid;
            grid-template-columns: repeat(17,50px);
            grid-template-rows: repeat(15,50px);
            background-color: #18353B
        }

    </style>
</head>
<body style="background: #373737; display: flex; align-content: center; justify-content: center;">
    
    <section id="root" style="background: #373737; display: flex; flex-direction: column; align-content: center; justify-content: center;" ></section>

    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel-->>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        var points = 0
        const root = document.getElementById('root')
        const reactRoot = ReactDOM.createRoot(root)

        const getRandomInt = (min, max) => {
            return Math.floor(Math.random() * (max - min + 1) + min);
        }

        const Title = ({title}) => {
        const[color, setColors] = React.useState(true)
        if (color) {
            return (
                <h1 style={{ color: "#A0CC00", fontSize: "50px", textAlign: "center" }} onClick={() => setColors(false)}>{title}</h1>
            )
        }
        return (
                <h1 style={{ color: "#02887C", fontSize: "50px", textAlign: "center"  }} onClick={() => setColors(true)}>{title}</h1>
        )
        }

        const Board = ({setShow}) => {
            const [fruitPos, setFruitPos] = React.useState({x: 4, y: 5})
            const [position, setPosition] = React.useState({x: 3, y: 4})
            const [direction, setDirection] = React.useState('ArrowRight')


            const gridCollition = () => {
                setTimeout(setShow(3), 250)
            }
            const Devoured = () => {
                points = points + 100
                setFruitPos({x: getRandomInt(1,17), y: getRandomInt(1,17)})
                console.log("Points:", points)
            }

            React.useEffect(() => {
                const handleKeyDown = (event) => {
                    switch (event.key) {
                        case 'ArrowRight':
                            setDirection('ArrowRight')
                            break

                        case 'ArrowLeft':
                            setDirection('ArrowLeft')
                            break

                        case 'ArrowUp':
                            setDirection('ArrowUp')
                            break

                        case 'ArrowDown':
                            setDirection('ArrowDown')
                            break
                    }
                }
                    window.addEventListener("keydown", handleKeyDown)
                    return () => {
                        window.removeEventListener("keydown", handleKeyDown)
                }
            }, [])

            React.useEffect(() => {
                const i = setInterval(() => {
                    setPosition((oldPosition) => {
                        let newPosition = { x: null, y: null }
                        switch (direction) {
                            case 'ArrowRight':
                                newPosition = {x: oldPosition.x + 1, y: oldPosition.y}
                                break

                            case 'ArrowLeft':
                                newPosition = {x: oldPosition.x - 1, y: oldPosition.y}
                                break

                            case 'ArrowUp':
                                newPosition = {x: oldPosition.x, y: oldPosition.y - 1}
                                break

                            case 'ArrowDown':
                                newPosition = {x: oldPosition.x, y: oldPosition.y + 1}
                                break
                        }
                        if (newPosition.x === fruitPos.x && newPosition.y === fruitPos.y) {
                            Devoured()
                        }

                        if (newPosition.x > 17 && direction === 'ArrowRight'){
                            gridCollition()
                        }

                        if (newPosition.x < 1 && direction === 'ArrowLeft'){
                            gridCollition()
                        }

                        if (newPosition.y > 15 && direction === 'ArrowDown'){
                            gridCollition()
                        }

                        if (newPosition.y < 0 && direction === 'ArrowUp'){
                            gridCollition()
                        }
                        return newPosition
                    })
                }, 250)
                return () => clearInterval(i)
            }, [direction, fruitPos])

            return (<main className="board"> <Fruit x={fruitPos.x} y={fruitPos.y} /> <Snake x={position.x} y={position.y} /> </main>)

        }
        const Snake = ({x, y}) => {
            
            const style_body = {
                display: 'flex',
                flexDirection: 'row',
                alignItems: 'center',
                justifyContent: 'center',
                gap: '5px',
                width: '50px',
                height: '50px',
                background: '#A0CC00',
                boxSizing: 'border-box',
                border: '1px solid #02887C',
                gridColumn: x,
                gridRow: y,
            }
            const style_eyes = {
                display: 'flex',
                flexDirection: 'row',
                alignItems: 'center',
                justifyContent: 'center',
                width:'15px',
                height: '15px',
                background: 'white',
            }

            return  <section style={style_body}>
                    <div style={style_eyes}>■</div>
                    <div style={style_eyes}>■</div>
                    </section>
        }

        const Start = ({setShow}) => {
            const style = {
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                justifyContent: 'center',
                height: '500px',
                width: '500px',
                background: '#A0CC00',
                border: '1px solid #18353B'
            }
            
            const font_style = {
                color: 'black',
                fontSize: '20px'
            }

            const button_style = {
                height: '20px',
                width: '20px',
                background: '#02887C',
                border: '1px solid #373737'
            }

            const button_font_style = {
                fontSize: '20px',
                color: 'white'
            }

                return (<section style={style}>
                <h2>Snake 🐍</h2>    
                <p style={font_style}>Welcome to the classic Snake Game! Press sssstart to play!</p>
                <button onClick={() => setShow(2)}>Start</button>
                </section> )
        }

        const GameOver = ({setShow}) => {
            const style = {
                display: 'flex',
                flexDirection: 'column',
                alignItems: 'center',
                justifyContent: 'center',
                height: '500px',
                width: '500px',
                background: '#A0CC00',
                border: '1px solid #18353B'
            }
            
            const font_style = {
                color: 'black',
                fontSize: '20px'
            }

            const button_style = {
                height: '20px',
                width: '20px',
                background: '#02887C',
                border: '1px solid #373737'
            }

            const button_font_style = {
                fontSize: '20px',
                color: 'white'
            }

                return (<section style={style}>
                <h2>Game Over! 🐍</h2>    
                <p style={font_style}>Dont worry! You can always try again!</p>
                <button onClick={() => setShow(2)}>Try Again</button>
                </section> )
        }

        const Fruit = ({x, y}) => {
            const style = {
                gridColumn: x,
                gridRow: y,
            }
            
            return <div style={style}> <img src="./Fruit.png" width="50px" height="50px"/> </div>
        }
        const Game = () => {
            const [show, setShow] = React.useState(1)
            let screen
            switch (show){
                case 1:
                    screen = <Start setShow = {setShow} />
                    break
                case 2:
                    screen = <Board setShow = {setShow}/>
                    break
                case 3:
                    screen = <GameOver setShow = {setShow}/>
                    break
                
            }
            return(
                <>
                <Title title = "Snake Game"/>
                {screen}
                </>
            )
        }
        reactRoot.render(<Game />)
    </script>
</body>
</html>
